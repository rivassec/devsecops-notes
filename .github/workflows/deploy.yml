name: Deploy Pelican Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deploy' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize submodules
        run: git submodule update --init --depth=1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install --require-hashes -r requirements.txt

      - name: Build site
        run: pelican content -o output -s publishconf.py

      - name: Add CNAME file
        run: echo rivassec.com > output/CNAME

      - name: Check links in built site
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --no-progress
            --base https://rivassec.com
            --remap "https://rivassec.com/ file://${{ github.workspace }}/output/"
            --verbose
            --accept 200..=299,429
            --exclude-path output/feeds
            './output/**/*.html'
          format: detailed
          fail: true

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ghp-import output -b gh-pages
          git push origin gh-pages --force
