name: Deploy Pelican Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'deploy' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize submodules
        run: git submodule update --init --depth=1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        # --no-deps because Pelican 4.12 hard-pins Pygments<2.20.0, but we
        # override Pygments to 2.20.0 in requirements.txt to patch the
        # AdlLexer ReDoS advisory (GHSA, dependabot alert #1). Every
        # transitive dep is already pinned with hashes in requirements.txt,
        # so --no-deps is safe and avoids the resolver conflict.
        run: pip install --require-hashes --no-deps -r requirements.txt

      - name: Refresh About page from GitHub profile README
        run: scripts/fetch_about.sh

      - name: Build site
        run: pelican content -o output -s publishconf.py

      - name: Add CNAME file
        run: echo rivassec.com > output/CNAME

      - name: Enforce strict CSP preconditions (no inline styles/scripts)
        # Keeps style-src 'self' / script-src 'self' safe: if a template
        # change ever introduces an inline style="..." or <style> block
        # or onclick= handler, this fails CI before deploy. See
        # docs/security-headers.md for the CSP we ship.
        run: |
          python3 scripts/csp_audit.py output

      - name: Check links in built site
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --base https://rivassec.com
            --remap "https://rivassec.com/ file://${{ github.workspace }}/output/"
            --verbose
            --accept 200..=299,429
            --exclude-path output/feeds
            './output/**/*.html'
          format: detailed
          fail: true

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ghp-import output -b gh-pages
          git push origin gh-pages --force
