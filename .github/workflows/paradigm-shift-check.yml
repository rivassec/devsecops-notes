name: Paradigm-shift check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# This workflow always succeeds. It exists to surface yellow warnings on
# PR pages for antithesis / "It is not X, it is Y" constructions, which
# tend to be LLM tells. Author retains discretion to keep the sentence.

jobs:
  check:
    name: scan markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Run paradigm-shift detector on all tracked markdown
        run: scripts/check_paradigm_shift.py
