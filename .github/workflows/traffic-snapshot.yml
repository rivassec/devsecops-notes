name: traffic-snapshot

on:
  schedule:
    # Daily at 14:00 UTC (07:00 PT). Picks up the prior day after GitHub
    # rolls its 14-day window over.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # If a previous snapshot is still running when the next one fires, let
  # the newer one wait rather than racing the commit.
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Run snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 scripts/traffic_snapshot.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add traffic-data/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          # The SQLite blob will change on every run because it stamps
          # last-run metadata; that is intentional. Use [skip ci] in the
          # message so this commit doesn't itself trigger deploy.yml,
          # since deploy.yml is gated on push to main and we don't want
          # a daily Pelican rebuild for a data-only change.
          git commit -m "traffic: daily snapshot $(date -u +%Y-%m-%d) [skip ci]"
          git push origin main
